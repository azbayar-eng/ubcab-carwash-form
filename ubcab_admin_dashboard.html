<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UBCAB Admin</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700;800&display=swap');
:root{--bg:#0A0A0A;--bg2:#111;--bg3:#1A1A1A;--bg4:#222;--text:#F0F0F0;--muted:#666;--border:#2A2A2A;--gold:#F5B800;--green:#34D399;--red:#F87171;--blue:#60A5FA;--orange:#FBBF24;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans',sans-serif;min-height:100vh;}
/* LOGIN */
.lw{display:flex;align-items:center;justify-content:center;min-height:100vh;}
.lb{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:36px;width:100%;max-width:360px;text-align:center;}
.lb h2{font-size:20px;font-weight:700;margin-bottom:6px;margin-top:16px;}
.lb p{font-size:13px;color:var(--muted);margin-bottom:22px;}
.li{width:100%;background:rgba(255,255,255,0.05);border:1.5px solid var(--border);border-radius:8px;padding:11px 13px;font-size:14px;color:var(--text);outline:none;margin-bottom:10px;font-family:'Noto Sans',sans-serif;display:block;}
.li:focus{border-color:rgba(245,184,0,0.4);}
.li::placeholder{color:var(--muted);}
.bl{width:100%;background:var(--gold);color:#000;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans',sans-serif;}
.bl:hover{background:#FFD033;}
.err{margin-top:10px;font-size:13px;color:#F87171;min-height:20px;}
/* DASHBOARD */
.dw{display:none;min-height:100vh;}
.dw.active{display:flex;}
.sb{width:210px;min-height:100vh;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;}
.sb-top{padding:16px;border-bottom:1px solid var(--border);}
.sb-nav{padding:10px 8px;flex:1;}
.si{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--muted);transition:all 0.2s;margin-bottom:2px;border:none;background:transparent;width:100%;text-align:left;font-family:'Noto Sans',sans-serif;}
.si:hover{background:rgba(255,255,255,0.05);color:var(--text);}
.si.active{background:rgba(245,184,0,0.1);color:var(--gold);font-weight:600;}
.sb-bot{padding:10px 8px;border-top:1px solid var(--border);}
.mn{flex:1;overflow:auto;}
.tb{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(10,10,10,0.95);position:sticky;top:0;z-index:10;}
.tb h1{font-size:17px;font-weight:700;}
.bl2{display:flex;align-items:center;gap:6px;background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.2);color:var(--green);font-size:11px;font-weight:600;padding:4px 12px;border-radius:100px;}
.bl2::before{content:'';width:5px;height:5px;background:var(--green);border-radius:50%;animation:blink 1.5s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
.ct{padding:22px;}
.pg{display:none;}.pg.active{display:block;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}
.sc{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:18px;}
.scl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.scv{font-weight:800;font-size:26px;margin-bottom:2px;}
.scs{font-size:11px;color:var(--muted);}
.gold{color:var(--gold);}.green{color:var(--green);}.blue{color:var(--blue);}.red{color:var(--red);}
.fb{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.si2{flex:1;min-width:180px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 13px;font-size:13px;color:var(--text);outline:none;font-family:'Noto Sans',sans-serif;}
.si2:focus{border-color:rgba(245,184,0,0.4);}
.si2::placeholder{color:var(--muted);}
.fs{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 13px;font-size:13px;color:var(--text);outline:none;cursor:pointer;font-family:'Noto Sans',sans-serif;}
.fs option{background:var(--bg3);}
.xbtn{display:flex;align-items:center;gap:6px;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:'Noto Sans',sans-serif;}
.xg{background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.2);color:var(--green);}
.xy{background:rgba(245,184,0,0.08);border:1px solid rgba(245,184,0,0.18);color:var(--gold);}
.tw{background:var(--bg3);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
table{width:100%;border-collapse:collapse;}
thead tr{border-bottom:1px solid var(--border);}
th{padding:11px 14px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);}
tbody tr{border-bottom:1px solid var(--border);transition:background 0.15s;cursor:pointer;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:rgba(255,255,255,0.03);}
td{padding:11px 14px;font-size:13px;color:rgba(255,255,255,0.8);}
.tn{font-weight:600;color:var(--text);}.tr2{font-weight:700;font-size:12px;color:var(--gold);}
.st{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:3px 9px;border-radius:100px;}
.st.new{background:rgba(96,165,250,0.1);color:var(--blue);border:1px solid rgba(96,165,250,0.2);}
.st.reviewing{background:rgba(251,191,36,0.1);color:var(--orange);border:1px solid rgba(251,191,36,0.2);}
.st.approved{background:rgba(52,211,153,0.1);color:var(--green);border:1px solid rgba(52,211,153,0.2);}
.st.rejected{background:rgba(248,113,113,0.1);color:var(--red);border:1px solid rgba(248,113,113,0.2);}
.em{text-align:center;padding:50px 20px;}
.emi{font-size:40px;margin-bottom:10px;opacity:0.3;}.emt{color:var(--muted);font-size:14px;}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;align-items:flex-start;justify-content:center;padding:24px;overflow-y:auto;}
.ov.active{display:flex;}
.md{background:var(--bg3);border:1px solid var(--border);border-radius:14px;width:100%;max-width:720px;margin:auto;}
.mh{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg3);border-radius:14px 14px 0 0;}
.mh h2{font-size:16px;font-weight:700;}
.mc{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;}
.mb{padding:22px;}
.ms{background:var(--bg4);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px;}
.mst{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.mg{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.mr{margin-bottom:10px;}
.mrl{font-size:11px;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);margin-bottom:4px;}
.mrv{font-size:14px;color:var(--text);line-height:1.5;}
.mf{grid-column:1/-1;}
.it{width:100%;max-height:160px;object-fit:cover;border-radius:8px;border:1px solid var(--border);cursor:pointer;margin-top:5px;transition:transform 0.2s;}
.it:hover{transform:scale(1.02);}
.pl{display:inline-flex;align-items:center;gap:6px;background:rgba(96,165,250,0.1);border:1px solid rgba(96,165,250,0.2);color:var(--blue);font-size:12px;padding:6px 12px;border-radius:7px;text-decoration:none;margin-top:6px;}
.ma{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;}
.ba{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid transparent;transition:all 0.2s;font-family:'Noto Sans',sans-serif;}
.bap{background:rgba(52,211,153,0.12);color:var(--green);border-color:rgba(52,211,153,0.22);}
.bar{background:rgba(251,191,36,0.1);color:var(--orange);border-color:rgba(251,191,36,0.2);}
.baj{background:rgba(248,113,113,0.1);color:var(--red);border-color:rgba(248,113,113,0.18);}
.bad{background:rgba(248,113,113,0.08);color:var(--red);border-color:rgba(248,113,113,0.15);}
.bad2{background:rgba(245,184,0,0.08);color:var(--gold);border-color:rgba(245,184,0,0.18);}
.tdel{font-size:11px;padding:5px 10px;border-radius:6px;background:rgba(248,113,113,0.08);color:var(--red);border:1px solid rgba(248,113,113,0.15);cursor:pointer;font-family:'Noto Sans',sans-serif;}
.lbx{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:999;align-items:center;justify-content:center;}
.lbx.active{display:flex;}
.lbx img{max-width:90vw;max-height:90vh;border-radius:8px;}
.lbc{position:absolute;top:20px;right:24px;background:none;border:none;color:white;font-size:32px;cursor:pointer;}
@media(max-width:768px){.sb{display:none;}.stats{grid-template-columns:1fr 1fr;}.mg{grid-template-columns:1fr;}}
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    snap.forEach(function(d) { window.__data.push(Object.assign({}, d.data(), {_docId: d.id})); });
    if (window.__dr) { renderTable(); renderStats(); }
  });
  window.__ss = function(docId, status) { return db.collection("submissions").doc(docId).update({status: status}); };
  window.__dd = function(docId) { return db.collection("submissions").doc(docId).delete(); };
} catch(e) { console.warn("Firebase:", e); }

function doLogin() {
  var u = document.getElementById("lu").value.trim();
  var p = document.getElementById("lp").value.trim();
  if (CREDS[u] && CREDS[u] === p) {
    document.getElementById("lw").style.display = "none";
    document.getElementById("dw").className = "dw active";
    window.__dr = true;
    renderTable();
    renderStats();
  } else {
    document.getElementById("le").textContent = "Нэвтрэх мэдээлэл буруу байна";
  }
}

function logout() {
  document.getElementById("dw").className = "dw";
  document.getElementById("lw").style.display = "flex";
  window.__dr = false;
}

function showPage(n) {
  document.querySelectorAll(".pg").forEach(function(p) { p.classList.remove("active"); });
  document.querySelectorAll(".si").forEach(function(b) { b.classList.remove("active"); });
  document.getElementById("p"+n).classList.add("active");
  document.getElementById("n"+n).classList.add("active");
  document.getElementById("pt").textContent = n===1 ? "Хамтрагчийн хүсэлтүүд" : "Статистик";
  if (n===2) renderStats();
}

function getData() {
  if (window.__data && window.__data.length) return window.__data;
  try { return JSON.parse(localStorage.getItem("ubcab_submissions") || "[]"); } catch(e) { return []; }
}

function renderTable() {
  var data = getData();
  var q = (document.getElementById("qi").value || "").toLowerCase();
  var sf = document.getElementById("sf").value;
  var filtered = data.filter(function(r) {
    var st = r.status || "new";
    var name = (r.lastname||"") + (r.firstname||"") + (r.rd||"") + (r.ref||"");
    return (!q || name.toLowerCase().indexOf(q) >= 0) && (!sf || st === sf);
  });
  var tbody = document.getElementById("tb");
  var em = document.getElementById("em");
  if (!filtered.length) { tbody.innerHTML = ""; em.style.display = "block"; return; }
  em.style.display = "none";
  var rows = "";
  for (var i=0; i<filtered.length; i++) {
    var r = filtered[i];
    var st = r.status || "new";
    var date = r.submittedAt ? new Date(r.submittedAt).toLocaleDateString("mn-MN") : "-";
    var loc = ((r.official_address || r.known_name || "-")).substring(0, 28);
    var ref = r.ref || "-";
    rows += "<tr onclick="openMo('"+ref+"')">";
    rows += "<td class="tr2">" + ref + "</td>";
    rows += "<td class="tn">" + (r.lastname||"") + " " + (r.firstname||"") + "</td>";
    rows += "<td>" + (r.phone||"-") + "</td>";
    rows += "<td style="color:var(--muted)">" + loc + "</td>";
    rows += "<td style="color:var(--muted)">" + date + "</td>";
    rows += "<td><span class="st " + st + "">" + (SL[st]||st) + "</span></td>";
    rows += "<td><button class="tdel" onclick="event.stopPropagation();confirmDel('"+ref+"')">🗑</button></td>";
    rows += "</tr>";
  }
  tbody.innerHTML = rows;
}

function fhtml(r, key) {
  var arr = (r.files && r.files[key]) ? r.files[key] : [];
  if (!arr.length) return "<span style="color:var(--muted);font-size:12px">Оруулаагүй</span>";
  var h = "";
  for (var i=0; i<arr.length; i++) {
    var f = arr[i];
    var isObj = typeof f === "object";
    var name = isObj ? (f.name||"файл") : String(f);
    var durl = isObj ? (f.dataURL||null) : null;
    var ftype = isObj ? (f.type||"") : "";
    var isImg = ftype.indexOf("image/") === 0 || /\.(jpe?g|png)$/i.test(name);
    var isPDF = ftype === "application/pdf" || /\.pdf$/i.test(name);
    h += "<div style="margin-bottom:8px">";
    h += "<div style="font-size:12px;color:var(--gold);font-weight:600">📎 " + name + "</div>";
    if (isImg && durl) {
      h += "<img src="" + durl + "" class="it" onclick="openLbx(this.src)">";
    } else if (isPDF && durl) {
      h += "<a href="" + durl + "" target="_blank" class="pl">📄 PDF харах</a>";
    } else if (!durl) {
      h += "<div style="font-size:11px;color:var(--muted);margin-top:3px">⚠️ Өгөгдөл байхгүй</div>";
    }
    h += "</div>";
  }
  return h;
}

  var st = r.status || "new";
  document.getElementById("mt").textContent = (r.lastname||"") + " " + (r.firstname||"") + " - " + ref;
  var b = "";
  b += "<div class="ms"><div class="mst">Лавлагаа & Статус</div><div class="mg">";

  b += "<div class="mr"><div class="mrl">ТТД</div><div class="mrv">"+(r.ttd||"-")+"</div></div>";
  b += "<div class="mr"><div class="mrl">Утас</div><div class="mrv">"+(r.phone||"-")+"</div></div>";
  b += "<div class="mr"><div class="mrl">И-мэйл</div><div class="mrv">"+(r.email||"-")+"</div></div>";

  b += "</div></div>";
  b += "<div class="ms"><div class="mst">Байршил & Ажиллах цаг</div><div class="mg">";
  b += "<div class="mr mf"><div class="mrl">Албан ёсны хаяг</div><div class="mrv">"+(r.official_address||"-")+"</div></div>";
  b += "<div class="mr mf"><div class="mrl">Түгээмэл нэршил</div><div class="mrv">"+(r.known_name||"-")+"</div></div>";
  b += "<div class="mr"><div class="mrl">Цагийн хуваарь</div><div class="mrv">"+(r.open_time||"-")+" - "+(r.close_time||"-")+"</div></div>";
  b += "<div class="mr"><div class="mrl">Ажлын өдрүүд</div><div class="mrv">"+(r.work_days||"-")+"</div></div>";
  var mlink = r.mapslink ? "<a href=""+r.mapslink+"" target="_blank" style="color:var(--blue);text-decoration:none">🗺️ Газрын зурагт харах</a>" : "-";
  b += "<div class="mr mf"><div class="mrl">Google Maps</div><div class="mrv">"+mlink+"</div></div>";
  b += "</div></div>";
  b += "<div class="ms"><div class="mst">Угаалгын газрын мэдээлэл</div><div class="mg">";
  b += "<div class="mr"><div class="mrl">Нэг дор угаадаг машин</div><div class="mrv">"+(r.cars_at_once||"-")+"</div></div>";
  b += "<div class="mr"><div class="mrl">Угаалгын бууны тоо</div><div class="mrv">"+(r.wash_bays||"-")+"</div></div>";
  b += "<div class="mr"><div class="mrl">Усны хангамж</div><div class="mrv">"+(r.water_supply||"-")+"</div></div>";
  b += "<div class="mr"><div class="mrl">Бохир усны шийдэл</div><div class="mrv">"+(r.waste_water||"-")+"</div></div>";
  b += "<div class="mr"><div class="mrl">Хүлээлгийн өрөө</div><div class="mrv">"+(r.waiting_room||"-")+"</div></div>";
  b += "<div class="mr"><div class="mrl">Нойл (WC)</div><div class="mrv">"+(r.toilet||"-")+"</div></div>";
  if (r.description) b += "<div class="mr mf"><div class="mrl">Танилцуулга</div><div class="mrv">"+(r.description||"-")+"</div></div>";
  b += "</div></div>";
  b += "<div class="ms"><div class="mst">📎 Иргэний үнэмлэх — урд</div>" + fhtml(r,"id-front") + "</div>";
  b += "<div class="ms"><div class="mst">📎 Иргэний үнэмлэх — ард</div>" + fhtml(r,"id-back") + "</div>";
  b += "<div class="ms"><div class="mst">📱 e-Mongolia лавлагаа</div>" + fhtml(r,"emongolia") + "</div>";

function closeMo() { document.getElementById("mo").classList.remove("active"); }
function openLbx(src) { document.getElementById("lbi").src = src; document.getElementById("lbx").classList.add("active"); }
function closeLbx() { document.getElementById("lbx").classList.remove("active"); document.getElementById("lbi").src = ""; }

function setSt(ref, status) {
  var data = getData();
  for (var i=0; i<data.length; i++) {
    if (data[i].ref === ref && data[i]._docId && window.__ss) {
      window.__ss(data[i]._docId, status); return;
    }
  }
  var s = JSON.parse(localStorage.getItem("ubcab_statuses")||"{}");
  s[ref] = status; localStorage.setItem("ubcab_statuses", JSON.stringify(s));
  renderTable(); renderStats();
}

function confirmDel(ref) {
  if (!confirm("Энэ хүсэлтийг устгах уу?")) return;
  var data = getData();
  for (var i=0; i<data.length; i++) {
    if (data[i].ref === ref && data[i]._docId && window.__dd) {
      window.__dd(data[i]._docId); return;
    }
  }
  var subs = getData().filter(function(x) { return x.ref !== ref; });
  localStorage.setItem("ubcab_submissions", JSON.stringify(subs));
  renderTable(); renderStats();
}

function dlOne(ref) {
  var data = getData();
  for (var i=0; i<data.length; i++) {
    if (data[i].ref === ref) {
      var a = document.createElement("a");
      a.href = URL.createObjectURL(new Blob([JSON.stringify(data[i],null,2)], {type:"application/json"}));
      a.download = "ubcab_" + ref + ".json"; a.click(); return;
    }
  }
}

function exportJSON() {
  var a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([JSON.stringify(getData(),null,2)], {type:"application/json"}));
  a.download = "ubcab_" + new Date().toISOString().split("T")[0] + ".json"; a.click();
}

function exportExcel() {
  var data = getData();
  if (!data.length) { alert("Хүсэлт байхгүй байна."); return; }
  var cols = ["Лавлагаа","Овог","Нэр","РД","ТТД","Утас","И-мэйл","Оршин суугаа хаяг","Албан ёсны хаяг","Түгээмэл нэршил","Нэг дор угаадаг машин","Угаалгын буу","Усны хангамж","Бохир ус","Хүлээлгийн өрөө","Нойл","Нээлттэй цаг","Хаалтын цаг","Ажлын өдрүүд","Maps линк","Статус","Огноо"];
  var csv = "﻿" + cols.map(function(c){return '"'+c+'"';}).join(",") + "
";
  data.forEach(function(r) {
    var row = [r.ref||"",r.lastname||"",r.firstname||"",r.rd||"",r.ttd||"",r.phone||"",r.email||"",r.address||"",r.official_address||"",r.known_name||"",r.cars_at_once||"",r.wash_bays||"",r.water_supply||"",r.waste_water||"",r.waiting_room||"",r.toilet||"",r.open_time||"",r.close_time||"",r.work_days||"",r.mapslink||"",r.status||"new",r.submittedAt?new Date(r.submittedAt).toLocaleString("mn-MN"):""];
    csv += row.map(function(c){return '"'+String(c).replace(/"/g,'""')+'"';}).join(",") + "
";
  });
  var a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([csv], {type:"text/csv;charset=utf-8"}));
  a.download = "ubcab_" + new Date().toISOString().split("T")[0] + ".csv"; a.click();
}

function renderStats() {
  var data = getData(), total = data.length;
  var ap = data.filter(function(r){return (r.status||"new")==="approved";}).length;
  var pe = data.filter(function(r){return ["new","reviewing"].indexOf(r.status||"new")>=0;}).length;
  var re2 = data.filter(function(r){return (r.status||"new")==="rejected";}).length;
  document.getElementById("sg").innerHTML =
    "<div class="sc"><div class="scl">Нийт хүсэлт</div><div class="scv gold">"+total+"</div><div class="scs">Бүх цаг үеийн</div></div>" +
    "<div class="sc"><div class="scl">Зөвшөөрсөн</div><div class="scv green">"+ap+"</div><div class="scs">"+(total?Math.round(ap/total*100):0)+"%</div></div>" +
    "<div class="sc"><div class="scl">Хүлээгдэж байна</div><div class="scv blue">"+pe+"</div><div class="scs">Шийдвэрлэх шаардлагатай</div></div>" +
    "<div class="sc"><div class="scl">Татгалзсан</div><div class="scv red">"+re2+"</div><div class="scs">"+(total?Math.round(re2/total*100):0)+"%</div></div>";
}
</script>
